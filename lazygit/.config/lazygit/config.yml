# Lazygit Configuration
gui:
  # Theme
  theme:
    activeBorderColor:
      - green
      - bold
    inactiveBorderColor:
      - white
    selectedLineBgColor:
      - reverse
    cherryPickedCommitBgColor:
      - cyan
    cherryPickedCommitFgColor:
      - blue
    unstagedChangesColor:
      - red
    defaultFgColor:
      - default
  # Show file icons (requires nerd font)
  showIcons: true
  # Border style
  border: rounded
  # Mouse support
  mouseEvents: true
  # Show random tip on startup
  showRandomTip: false
  # Split pane sizes
  sidePanelWidth: 0.3333
  mainPanelSplitMode: flexible
  # Language
  language: en
  # Time format
  timeFormat: 02 Jan 06
  # Short time format
  shortTimeFormat: 3:04PM
git:
  # Paging
  pagers:
    - colorArg: always
      pager: "delta --dark --paging=never"
  # Commit settings
  commit:
    signOff: false
  # Auto fetch
  autoFetch: true
  autoRefresh: true
  # Branches settings
  branchLogCmd: git log --graph --color=always --oneline {{branchName}} --
  # Merge/Rebase
  merging:
    manualCommit: false
    args: ""
  # Log
  log:
    order: topo-order
    showGraph: when-maximised
  # Skip hook prefix
  skipHookPrefix: WIP
  # Parsing
  parseEmoji: true
  allBranchesLogCmds:
    - git log --graph --all --color=always --oneline --
os:
  # Edit command - uses your $EDITOR or defaults to nvim
  editPreset: nvim
  # Open command
  openCommand: xdg-open {{filename}}
# Keybindings (using vim-style)
keybinding:
  universal:
    quit: q
    quit-alt1: <c-c>
    return: <esc>
    quitWithoutChangingDirectory: Q
    togglePanel: <tab>
    prevItem: <up>
    nextItem: <down>
    prevItem-alt: k
    nextItem-alt: j
    prevPage: <c-u>
    nextPage: <c-d>
    scrollLeft: H
    scrollRight: L
    gotoTop: <
    gotoBottom: ">"
    toggleRangeSelect: v
    rangeSelectDown: <s-down>
    rangeSelectUp: <s-up>
    prevBlock: <left>
    nextBlock: <right>
    prevBlock-alt: h
    nextBlock-alt: l
    jumpToBlock:
      - "1"
      - "2"
      - "3"
      - "4"
      - "5"
    nextMatch: n
    prevMatch: N
    startSearch: /
    optionMenu: <disabled>
    optionMenu-alt1: "?"
    select: <space>
    goInto: <enter>
    confirm: <enter>
    confirmInEditor: <a-enter>
    remove: d
    new: n
    edit: e
    openFile: o
    scrollUpMain: <pgup>
    scrollDownMain: <pgdown>
    scrollUpMain-alt1: K
    scrollDownMain-alt1: J
    scrollUpMain-alt2: <c-u>
    scrollDownMain-alt2: <c-d>
    executeShellCommand: ":"
    createRebaseOptionsMenu: m
    pushFiles: P
    pullFiles: p
    refresh: R
    createPatchOptionsMenu: <c-p>
    nextTab: "]"
    prevTab: "["
    nextScreenMode: +
    prevScreenMode: _
    undo: u
    redo: <c-r>
    filteringMenu: <c-s>
    diffingMenu: W
    diffingMenu-alt: <c-e>
    copyToClipboard: <c-o>
    submitEditorText: <enter>
    extrasMenu: "@"
    toggleWhitespaceInDiffView: <c-w>
    increaseContextInDiffView: "}"
    decreaseContextInDiffView: "{"
    openDiffTool: <c-t>
  branches:
    createPullRequest: o
    viewPullRequestOptions: O
    checkoutBranchByName: c
    forceCheckoutBranch: F
    rebaseBranch: r
    renameBranch: R
    mergeIntoCurrentBranch: M
    viewGitFlowOptions: i
    fastForward: f
    createTag: T
    pushTag: P
    setUpstream: u
    fetchRemote: f
  commits:
    squashDown: s
    renameCommit: r
    renameCommitWithEditor: R
    viewResetOptions: g
    markCommitAsFixup: f
    createFixupCommit: F
    squashAboveCommits: S
    moveDownCommit: <c-j>
    moveUpCommit: <c-k>
    amendToCommit: A
    amendAttributeMenu: a
    pickCommit: p
    revertCommit: t
    cherryPickCopy: C
    pasteCommits: V
    tagCommit: T
    checkoutCommit: <space>
    resetCherryPick: <c-R>
    copyCommitMessageToClipboard: <c-y>
    openLogMenu: <c-l>
    openInBrowser: o
    viewBisectOptions: b
    startInteractiveRebase: i
  stash:
    popStash: g
    renameStash: r
  files:
    commitChanges: c
    commitChangesWithoutHook: w
    amendLastCommit: A
    commitChangesWithEditor: C
    findBaseCommitForFixup: <c-f>
    confirmDiscard: x
    ignoreFile: i
    refreshFiles: r
    stashAllChanges: s
    viewStashOptions: S
    toggleStagedAll: a
    viewResetOptions: D
    fetch: f
    toggleTreeView: "`"
    openMergeOptions: M
    openStatusFilter: <c-b>
    copyFileInfoToClipboard: "y"
  submodules:
    init: i
    update: u
    bulkMenu: b
# Refresh mode
refresher:
  refreshInterval: 10
  fetchInterval: 60
# Confirmations
confirmOnQuit: false
# Update settings
update:
  method: never
# Custom commands
customCommands:
  - key: "<c-f>"
    command: "git fetch --all --prune"
    context: "global"
    description: "Fetch all remotes and prune"
